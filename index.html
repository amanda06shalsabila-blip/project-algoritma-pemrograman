<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiGame – Score System</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ══ NAVBAR ══ -->
  <nav>
    <div class="logo">Multi<span>Game</span></div>

    <div class="game-modes">
      <button class="mode-pill active-match" id="btn-match" onclick="switchMode('match')">
        <span class="icon">🧩</span> Match
      </button>
      <button class="mode-pill" id="btn-jigsaw" onclick="switchMode('jigsaw')">
        <span class="icon">🍓</span> Jigsaw
      </button>
    </div>

    <button class="btn-reset" onclick="resetGame()">Reset</button>
  </nav>

  <!-- ══ STATS BAR ══ -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value cyan" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Trial</div>
      <div class="stat-value red" id="trial">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Combo</div>
      <div class="stat-value yellow" id="combo">x1</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Time</div>
      <div class="stat-value green" id="timer">0:00</div>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <main>
    <p class="hint" id="hint-text">Click the card to get started!</p>

    <!-- Category Bar (Match only) -->
    <div class="cat-bar" id="cat-bar">
      <span class="cat-label">Select a Category</span>
    </div>

    <!-- Match Card Grid -->
    <div class="card-grid" id="match-grid"></div>

    <!-- Jigsaw View — content built dynamically by script.js -->
    <div id="jigsaw-view"></div>
  </main>

  <!-- ══ WIN OVERLAY ══ -->
  <div id="win-overlay">
    <div class="win-box">
      <div class="win-emoji">🎉</div>
      <div class="win-title">You Win!</div>
      <div class="win-sub" id="win-sub">Skor: 0 | Waktu: 0:00</div>
      <button class="win-btn" onclick="resetGame()">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
